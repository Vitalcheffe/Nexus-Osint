      #   value: YOUR_KEY
      # - key: CLOUDFLARE_RADAR_TOKEN
      #   value: YOUR_KEY
      # - key: AISSTREAM_API_KEY
      #   value: YOUR_KEY
      # - key: TELEGRAM_API_ID
      #   value: YOUR_ID
