services:
  - type: web
    name: nexus-platform
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0
      - key: PORT
        value: 3000
      # ── Clés optionnelles — ajouter dans Render Dashboard > Environment ──
      # - key: ACLED_API_KEY
      #   value: YOUR_KEY
      # - key: ACLED_EMAIL
      #   value: YOUR_EMAIL
